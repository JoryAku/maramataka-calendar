<section
  class="maramataka-page"
  [attr.lang]="store.language() === 'mi' ? 'mi' : 'en-NZ'"
>
  <header class="page-header">
    <div class="title-row">
      <h1>{{ store.copy().appTitle }}</h1>

      <section
        class="control-panel language-panel"
        [attr.aria-label]="store.copy().controls.language"
      >
        <label class="control-label" for="language-select">
          {{ store.copy().controls.language }}
        </label>
        <select
          id="language-select"
          class="control-input language-input"
          [value]="store.language()"
          autocomplete="language"
          (change)="onLanguageChange($any($event.target).value)"
        >
          <option value="en" lang="en">{{ store.copy().languages.en }}</option>
          <option value="mi" lang="mi">{{ store.copy().languages.mi }}</option>
        </select>
      </section>
    </div>

    <div class="controls">
      <section
        class="control-panel"
        [attr.aria-label]="store.copy().controls.location"
      >
        <label class="control-label" for="location-select">
          {{ store.copy().controls.location }}
        </label>
        @if (store.locationsLoading()) {
        <p
          class="state compact"
          data-testid="locations-loading-state"
          role="status"
          aria-live="polite"
        >
          {{ store.copy().controls.loadingLocations }}
        </p>
        } @else if (store.locationsError()) {
        <p
          class="state error compact"
          data-testid="locations-error-state"
          role="alert"
        >
          {{ store.locationsError() }}
        </p>
        } @else {
        <select
          id="location-select"
          class="control-input"
          [value]="store.selectedLocationId()"
          (change)="onLocationChange($any($event.target).value)"
        >
          @for (location of store.locations(); track location.id) {
          <option [value]="location.id">{{ location.name }}</option>
          }
        </select>
        }
      </section>

      <section
        class="control-panel"
        [attr.aria-label]="store.copy().controls.viewDate"
      >
        <label class="control-label" for="date-select">
          {{ store.copy().controls.viewDate }}
        </label>
        <input
          id="date-select"
          class="control-input"
          type="date"
          [value]="store.selectedDate()"
          (change)="onDateChange($any($event.target).value)"
        />
      </section>

      <div class="control-actions">
        <button
          class="secondary-button"
          type="button"
          [disabled]="store.useLiveDate()"
          [attr.aria-label]="
            store.useLiveDate()
              ? store.copy().controls.useTodayDisabled
              : store.copy().controls.useToday
          "
          [attr.title]="
            store.useLiveDate() ? store.copy().controls.useTodayDisabled : null
          "
          (click)="resetDateToToday()"
        >
          {{ store.copy().controls.useToday }}
        </button>
      </div>
    </div>
  </header>

  <app-maramataka-today-view
    [copy]="store.copy()"
    [selectedLocationName]="store.selectedLocationName()"
    [todayLoading]="store.todayLoading()"
    [todayError]="store.todayError()"
    [today]="store.today()"
    [now]="store.now()"
    [moonDetailsLoading]="store.moonDetailsLoading()"
    [moonDetailsError]="store.moonDetailsError()"
    [moonDetails]="store.moonDetails()"
    [starMarkersLoading]="store.starMarkersLoading()"
    [starMarkersError]="store.starMarkersError()"
    [starMarkers]="store.starMarkers()"
  ></app-maramataka-today-view>

  <app-maramataka-cycle-view
    [copy]="store.copy()"
    [selectedLocationName]="store.selectedLocationName()"
    [monthLoading]="store.monthLoading()"
    [monthError]="store.monthError()"
    [month]="store.month()"
    [cycleLoading]="store.cycleLoading()"
    [cycleError]="store.cycleError()"
    [cycle]="store.cycle()"
    [yearEvents]="store.year()?.events ?? []"
    [now]="store.now()"
    (nightSelected)="selectNight($event)"
  ></app-maramataka-cycle-view>

  <app-maramataka-year-view
    [copy]="store.copy()"
    [yearLoading]="store.yearLoading()"
    [yearTimelineLoading]="store.yearTimelineLoading()"
    [yearTimelineError]="store.yearTimelineError()"
    [yearError]="store.yearError()"
    [year]="store.year()"
    [selectedDate]="store.now()"
    (monthSelected)="selectYearMonth($event)"
  ></app-maramataka-year-view>
</section>
