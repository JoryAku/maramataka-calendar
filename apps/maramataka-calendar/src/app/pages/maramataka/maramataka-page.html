<section class="maramataka-page">
  <header class="page-header">
    <div>
      <h1>Maramataka</h1>
    </div>

    <div class="controls">
      <section class="control-panel" aria-label="Location">
        <label class="control-label" for="location-select">Location</label>
        @if (locationsLoading()) {
        <p class="state compact" data-testid="locations-loading-state">
          Loading locations...
        </p>
        } @else if (locationsError()) {
        <p class="state error compact" data-testid="locations-error-state">
          {{ locationsError() }}
        </p>
        } @else {
        <select
          id="location-select"
          class="control-input"
          [value]="selectedLocationId()"
          (change)="onLocationChange($any($event.target).value)"
        >
          @for (location of locations(); track location.id) {
          <option [value]="location.id">{{ location.name }}</option>
          }
        </select>
        }
      </section>

      <section class="control-panel" aria-label="View date">
        <label class="control-label" for="date-select">View date</label>
        <input
          id="date-select"
          class="control-input"
          type="date"
          [value]="selectedDate()"
          (change)="onDateChange($any($event.target).value)"
        />
      </section>

      <div class="control-actions">
        <button
          class="secondary-button"
          type="button"
          [disabled]="useLiveDate()"
          (click)="resetDateToToday()"
        >
          Use today
        </button>
      </div>
    </div>
  </header>

  <app-maramataka-today-view
    [selectedLocationName]="selectedLocationName()"
    [todayLoading]="todayLoading()"
    [todayError]="todayError()"
    [today]="today()"
    [now]="now()"
    [moonDetailsLoading]="moonDetailsLoading()"
    [moonDetailsError]="moonDetailsError()"
    [moonDetails]="moonDetails()"
    [starMarkersLoading]="starMarkersLoading()"
    [starMarkersError]="starMarkersError()"
    [starMarkers]="starMarkers()"
  ></app-maramataka-today-view>

  <app-maramataka-cycle-view
    [selectedLocationName]="selectedLocationName()"
    [monthLoading]="monthLoading()"
    [monthError]="monthError()"
    [month]="month()"
    [cycleLoading]="cycleLoading()"
    [cycleError]="cycleError()"
    [cycle]="cycle()"
    [yearEvents]="year()?.events ?? []"
    [now]="now()"
    (nightSelected)="selectNight($event)"
  ></app-maramataka-cycle-view>

  <app-maramataka-year-view
    [yearLoading]="yearLoading()"
    [yearTimelineLoading]="yearTimelineLoading()"
    [yearTimelineError]="yearTimelineError()"
    [yearError]="yearError()"
    [year]="year()"
    [selectedDate]="now()"
    (monthSelected)="selectYearMonth($event)"
  ></app-maramataka-year-view>
</section>
