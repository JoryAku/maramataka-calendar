<article class="night-card" [class.current]="isCurrent()">
  <h3>{{ night().mata }}</h3>
  @if (night().overlappingMata?.length) {
  <p class="overlap-label">
    Also {{ night().overlappingMata![0].mata }} for the next cycle
  </p>
  }

  <dl>
    <dt>Moonrise</dt>
    <dd>{{ formatNightStart() }}</dd>
  </dl>
</article>
